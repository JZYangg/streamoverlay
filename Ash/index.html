<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Streaming Overlay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Animated Left Sidebar */
        .sidebar {
            width: 480px; /* Left column width */
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: white;
            z-index: 2;
            
            /* Animated Maroon & Black Gradient Background */
            background: linear-gradient(135deg, #000000, #4a000e, #1a0005, #800020, #000000);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            border-right: 4px solid #ba1331;
            box-shadow: 10px 0px 30px rgba(0, 0, 0, 0.7);
        }

        /* Subtle glowing border animation */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Placeholder styles for your sidebar content */
        .stream-info {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ca1f3b;
            backdrop-filter: blur(5px);
        }

        .stream-info h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ff3355;
            text-shadow: 0 0 10px rgba(255, 51, 85, 0.5);
        }

        .stream-info p {
            font-size: 16px;
            color: #ccc;
        }

        /* Right Side: The iPad Gameplay Area */
        .gameplay-container {
            width: 1440px; /* Fills the rest of the 1920px width */
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 1;
        }

        /* 4:3 Aspect Ratio Box for modern iPads */
        .ipad-screen-placeholder {
            width: 1360px; 
            height: 1020px; 
            border: 4px solid #ca1f3b;
            background: transparent; /* Transparent so the iPad capture shows through */
            border-radius: 24px;
            box-shadow: 0 0 25px rgba(202, 31, 59, 0.4);
            position: relative;
        }

        /* Live Indicator Animation */
        .live-indicator {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #ca1f3b;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(202, 31, 59, 0.7); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(202, 31, 59, 0); }
            100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(202, 31, 59, 0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="stream-info">
            <h1>LIVE STREAM</h1>
            <p>Welcome to the channel!</p>
        </div>
        
        <div class="stream-info" style="height: 300px; display: flex; align-items: center; justify-content: center; border-left: 5px solid #ff3355;">
            <p style="font-style: italic; color: #888;">[Place Webcam or Chat Here]</p>
        </div>

        <div class="stream-info">
            <p>Follow & Subscribe for more!</p>
        </div>
    </div>

    <div class="gameplay-container">
        <div class="ipad-screen-placeholder">
            <div class="live-indicator">🔴 LIVE</div>
        </div>
    </div>

</body>
</html>
