<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Streaming Overlay (Full Left Screen - Right Sidebar)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Left Side: Fills the entire 1440px remaining width exactly up to the sidebar */
        .gameplay-container {
            width: 1540px; 
            height: 1080px;
            background: transparent;
            z-index: 1;
            position: relative;
        }

        /* iPad Screen Area: Stretched to completely fill the 1440x1080 area up to the sidebar */
        .ipad-screen-placeholder {
            width: 100%; 
            height: 100%; 
            border-right: 2px solid #ff1a40; /* Sharp dividing border against the sidebar */
            background: transparent;
            position: relative;
        }

        /* Live Indicator Animation */
        .live-indicator {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #ff1a40;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            color: white;
            z-index: 10;
            animation: indicatorPulse 2s infinite;
        }

        @keyframes indicatorPulse {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(255, 26, 64, 0.7); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(255, 26, 64, 0); }
            100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(255, 26, 64, 0); }
        }

        /* PREMIUM ANIMATED RIGHT SIDEBAR */
        .sidebar {
            width: 380px; /* Right column width */
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 40px;
            color: white;
            z-index: 2;
            overflow: hidden;
            
            /* Pure Black & Red Fluid Moving Gradient */
            background: linear-gradient(-45deg, #000000, #400000, #100000, #ff002b, #000000);
            background-size: 400% 400%;
            animation: gradientLoop 12s ease infinite;
            
            /* Neon Left Border flush against the gameplay area */
            border-left: 2px solid #ff1a40;
            box-shadow: -10px 0px 30px rgba(255, 26, 64, 0.2), -20px 0px 50px rgba(0, 0, 0, 0.9);
        }

        @keyframes gradientLoop {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cyber Scanline Layer */
        .sidebar::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 3;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.6;
        }

        /* FLOATING DOTS BACKGROUND ANIMATION */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 26, 64, 0.5);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        /* Natural floating timing variations */
        .dot:nth-child(1) { left: 8%; width: 5px; height: 5px; animation-duration: 9s; animation-delay: 0s; }
        .dot:nth-child(2) { left: 22%; width: 4px; height: 4px; animation-duration: 12s; animation-delay: 1.5s; background: rgba(255, 255, 255, 0.2); }
        .dot:nth-child(3) { left: 35%; width: 7px; height: 7px; animation-duration: 8s; animation-delay: 0.5s; }
        .dot:nth-child(4) { left: 50%; width: 3px; height: 3px; animation-duration: 15s; animation-delay: 3s; }
        .dot:nth-child(5) { left: 68%; width: 6px; height: 6px; animation-duration: 10s; animation-delay: 2s; background: rgba(255, 255, 255, 0.15); }
        .dot:nth-child(6) { left: 82%; width: 8px; height: 8px; animation-duration: 7s; animation-delay: 4.5s; }
        .dot:nth-child(7) { left: 93%; width: 4px; height: 4px; animation-duration: 11s; animation-delay: 1s; }
        
        .dot:nth-child(8) { left: 15%; width: 6px; height: 6px; animation-duration: 10s; animation-delay: 5s; }
        .dot:nth-child(9) { left: 28%; width: 8px; height: 8px; animation-duration: 6.5s; animation-delay: 2.5s; }
        .dot:nth-child(10) { left: 42%; width: 4px; height: 4px; animation-duration: 13s; animation-delay: 6s; background: rgba(255, 255, 255, 0.25); }
        .dot:nth-child(11) { left: 58%; width: 5px; height: 5px; animation-duration: 9.5s; animation-delay: 0.8s; }
        .dot:nth-child(12) { left: 74%; width: 7px; height: 7px; animation-duration: 8.5s; animation-delay: 4s; }
        .dot:nth-child(13) { left: 88%; width: 3px; height: 3px; animation-duration: 16s; animation-delay: 1.8s; }

        .dot:nth-child(14) { left: 5%; width: 7px; height: 7px; animation-duration: 7.5s; animation-delay: 3.5s; }
        .dot:nth-child(15) { left: 18%; width: 4px; height: 4px; animation-duration: 11.5s; animation-delay: 7s; }
        .dot:nth-child(16) { left: 31%; width: 5px; height: 5px; animation-duration: 9s; animation-delay: 5.2s; }
        .dot:nth-child(17) { left: 47%; width: 8px; height: 8px; animation-duration: 6s; animation-delay: 1.2s; background: rgba(255, 255, 255, 0.2); }
        .dot:nth-child(18) { left: 63%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: 4.8s; }
        .dot:nth-child(19) { left: 79%; width: 6px; height: 6px; animation-duration: 10.5s; animation-delay: 2.2s; }
        .dot:nth-child(20) { left: 95%; width: 5px; height: 5px; animation-duration: 8.8s; animation-delay: 6.5s; }

        .dot:nth-child(21) { left: 12%; width: 4px; height: 4px; animation-duration: 12.5s; animation-delay: 8s; }
        .dot:nth-child(22) { left: 38%; width: 6px; height: 6px; animation-duration: 9.8s; animation-delay: 3.9s; }
        .dot:nth-child(23) { left: 70%; width: 8px; height: 8px; animation-duration: 7.2s; animation-delay: 5.5s; }
        .dot:nth-child(24) { left: 85%; width: 5px; height: 5px; animation-duration: 11s; animation-delay: 0.2s; background: rgba(255, 255, 255, 0.1); }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1150px) scale(0.5); opacity: 0; }
        }

        /* Glassmorphism panel container for sidebar text elements */
        .stream-info {
            background: rgba(0, 0, 0, 0.65);
            padding: 25px;
            border-radius: 14px;
            border: 1px solid rgba(255, 26, 64, 0.2);
            border-right: 5px solid #ff1a40;
            backdrop-filter: blur(10px);
            z-index: 5;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            animation: panelGlow 4s ease-in-out infinite alternate;
        }

        @keyframes panelGlow {
            0% { border-color: rgba(255, 26, 64, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); }
            100% { border-color: rgba(255, 26, 64, 0.5); box-shadow: 0 8px 32px 0 rgba(255, 26, 64, 0.15); }
        }

        .stream-info p {
            font-size: 16px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="gameplay-container">
        <div class="ipad-screen-placeholder">
            <div class="live-indicator">🔴 LIVE</div>
        </div>
    </div>

    <div class="sidebar">
        
        <div class="particles">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div></div>
    </div>

</body>
</html>
