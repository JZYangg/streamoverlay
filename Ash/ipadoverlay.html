<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Streaming Overlay (Right Sidebar)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Left Side: The iPad Gameplay Area */
        .gameplay-container {
            width: 1440px; /* Fills the 1440px width on the left */
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 1;
        }

        /* 4:3 Aspect Ratio Box for modern iPads */
        .ipad-screen-placeholder {
            width: 1360px; 
            height: 1020px; 
            border: 4px solid #ca1f3b;
            background: transparent;
            border-radius: 24px;
            box-shadow: 0 0 25px rgba(202, 31, 59, 0.4);
            position: relative;
        }

        /* Live Indicator Animation */
        .live-indicator {
            position: absolute;
            top: 25px;
            left: 25px; /* Moved to left side since sidebar is on the right */
            background: #ca1f3b;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            animation: indicatorPulse 2s infinite;
        }

        @keyframes indicatorPulse {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(202, 31, 59, 0.7); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(202, 31, 59, 0); }
            100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(202, 31, 59, 0); }
        }

        /* PREMIUM ANIMATED RIGHT SIDEBAR */
        .sidebar {
            width: 480px; /* Right column width */
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: white;
            z-index: 2;
            overflow: hidden;
            
            /* Enhanced Diagonal Moving Gradient */
            background: linear-gradient(-45deg, #000000, #3a000a, #140003, #600018, #1a0005, #000000);
            background-size: 400% 400%;
            animation: gradientLoop 15s ease infinite;
            
            /* Neon Left Border */
            border-left: 4px solid #ff1a40;
            box-shadow: -10px 0px 30px rgba(255, 26, 64, 0.2), -20px 0px 50px rgba(0, 0, 0, 0.8);
        }

        /* Cyber Scanline Overlay Effect */
        .sidebar::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 3;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Moving light bar animation inside the sidebar */
        .sidebar::after {
            content: "";
            position: absolute;
            top: -50%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(202, 31, 59, 0.15), transparent);
            animation: scanlineMove 6s linear infinite;
            z-index: 4;
            pointer-events: none;
        }

        /* Keyframes for Advanced Background Fluid Loop */
        @keyframes gradientLoop {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Keyframes for vertical scanline */
        @keyframes scanlineMove {
            0% { top: -50%; }
            100% { top: 150%; }
        }

        /* Content Containers with Glassmorphism and pulsing borders */
        .stream-info {
            background: rgba(15, 5, 5, 0.6);
            padding: 25px;
            border-radius: 14px;
            border: 1px solid rgba(202, 31, 59, 0.3);
            border-right: 5px solid #ff1a40;
            backdrop-filter: blur(10px);
            z-index: 5;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: panelGlow 4s ease-in-out infinite alternate;
        }

        @keyframes panelGlow {
            0% { border-color: rgba(202, 31, 59, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
            100% { border-color: rgba(255, 26, 64, 0.6); box-shadow: 0 8px 32px 0 rgba(255, 26, 64, 0.1); }
        }

        /* Glowing Neon Header */
        .stream-info h1 {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff1a40, 0 0 20px #ff1a40;
            animation: textNeon 3s ease-in-out infinite alternate;
        }

        @keyframes textNeon {
            0% { text-shadow: 0 0 4px #fff, 0 0 10px #ca1f3b, 0 0 15px #ca1f3b; }
            100% { text-shadow: 0 0 6px #fff, 0 0 14px #ff1a40, 0 0 25px #ff1a40; }
        }

        .stream-info p {
            font-size: 16px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="gameplay-container">
        <div class="ipad-screen-placeholder">
            <div class="live-indicator">🔴 LIVE</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="stream-info">
            <h1>LIVE STREAM</h1>
            <p>Welcome to the channel!</p>
        </div>
        
        <div class="stream-info" style="height: 320px; display: flex; align-items: center; justify-content: center; border-right: 5px solid #ff1a40;">
            <p style="font-style: italic; color: #aaa; text-align: center;">[Place Webcam, Chat Box,<br>or Stream Alerts Here]</p>
        </div>

        <div class="stream-info">
            <p>Don't forget to Follow & Share!</p>
        </div>
    </div>

</body>
</html>
