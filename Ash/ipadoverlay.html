<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Streaming Overlay (Full Left Screen - Right Sidebar)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Left Side: Fills the entire 1440px remaining width exactly up to the sidebar */
        .gameplay-container {
            width: 1440px; 
            height: 1080px;
            background: transparent;
            z-index: 1;
            position: relative;
        }

        /* iPad Screen Area: Stretched to completely fill the 1440x1080 area up to the sidebar */
        .ipad-screen-placeholder {
            width: 100%; 
            height: 100%; 
            border-right: 2px solid #ff1a40; /* Sharp dividing border against the sidebar */
            background: transparent;
            position: relative;
        }

        /* Live Indicator Animation */
        .live-indicator {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #ff1a40;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            color: white;
            z-index: 10;
            animation: indicatorPulse 2s infinite;
        }

        @keyframes indicatorPulse {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(255, 26, 64, 0.7); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(255, 26, 64, 0); }
            100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(255, 26, 64, 0); }
        }

        /* PREMIUM ANIMATED RIGHT SIDEBAR */
        .sidebar {
            width: 480px; /* Right column width */
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 40px;
            color: white;
            z-index: 2;
            overflow: hidden;
            
            /* Pure Black & Red Fluid Moving Gradient */
            background: linear-gradient(-45deg, #000000, #400000, #100000, #ff002b, #000000);
            background-size: 400% 400%;
            animation: gradientLoop 12s ease infinite;
            
            /* Neon Left Border flush against the gameplay area */
            border-left: 2px solid #ff1a40;
            box-shadow: -10px 0px 30px rgba(255, 26, 64, 0.2), -20px 0px 50px rgba(0, 0, 0, 0.9);
        }

        @keyframes gradientLoop {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cyber Scanline Layer */
        .sidebar::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 3;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.6;
        }

        /* FLOATING DOTS BACKGROUND ANIMATION */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 26, 64, 0.5);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        /* Natural floating timing variations */
        .dot:nth-child(1) { left: 10%; width: 6px; height: 6px; animation-duration: 8s; animation-delay: 0s; }
        .dot:nth-child(2) { left: 30%; width: 4px; height: 4px; animation-duration: 11s; animation-delay: 2s; background: rgba(255, 255, 255, 0.3); }
        .dot:nth-child(3) { left: 55%; width: 8px; height: 8px; animation-duration: 7s; animation-delay: 1s; }
        .dot:nth-child(4) { left: 75%; width: 5px; height: 5px; animation-duration: 14s; animation-delay: 4s; }
        .dot:nth-child(5) { left: 90%; width: 7px; height: 7px; animation-duration: 9s; animation-delay: 3s; background: rgba(255, 255, 255, 0.2); }
        .dot:nth-child(6) { left: 20%; width: 5px; height: 5px; animation-duration: 12s; animation-delay: 6s; }
        .dot:nth-child(7) { left: 45%; width: 9px; height: 9px; animation-duration: 6s; animation-delay: 2.5s; }
        .dot:nth-child(8) { left: 85%; width: 4px; height: 4px; animation-duration: 10s; animation-delay: 5s; }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-1150px) scale(0.5); opacity: 0; }
        }

        /* Glassmorphism panel container for sidebar text elements */
        .stream-info {
            background: rgba(0, 0, 0, 0.65);
            padding: 25px;
            border-radius: 14px;
            border: 1px solid rgba(255, 26, 64, 0.2);
            border-right: 5px solid #ff1a40;
            backdrop-filter: blur(10px);
            z-index: 5;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            animation: panelGlow 4s ease-in-out infinite alternate;
        }

        @keyframes panelGlow {
            0% { border-color: rgba(255, 26, 64, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); }
            100% { border-color: rgba(255, 26, 64, 0.5); box-shadow: 0 8px 32px 0 rgba(255, 26, 64, 0.15); }
        }

        .stream-info p {
            font-size: 16px;
            color: #e0e0e0;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="gameplay-container">
        <div class="ipad-screen-placeholder">
            <div class="live-indicator">🔴 LIVE</div>
        </div>
    </div>

    <div class="sidebar">
        
        <div class="particles">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div></div>
    </div>

</body>
</html>
