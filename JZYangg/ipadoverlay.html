<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay - Cyber Matrix Premium Frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Left Side: iPad Gameplay Viewport */
        .gameplay-container {
            width: 1440px;
            height: 1080px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            background: transparent;
            z-index: 1;
        }

        .ipad-screen-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 1440px;
            height: 1080px;
            border-right: 2px solid rgba(0, 255, 213, 0.25);
            background: transparent;
            z-index: -1;
        }

        .live-indicator {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #00ffd5;
            color: #001326;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 213, 0.6);
            animation: indicatorPulse 1.5s infinite;
        }

        @keyframes indicatorPulse {
            0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(0, 255, 213, 0.7); }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(0, 255, 213, 0); }
            100% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 0 0 rgba(0, 255, 213, 0); }
        }

        /* HIGH-SPEED CLEAN NEON MATRIX RIGHT SIDEBAR */
        .sidebar {
            width: 480px;
            height: 1080px;
            position: relative;
            z-index: 2;
            overflow: hidden;
            
            /* Enhanced Matrix Gradient Sequence matching the background style */
            background: linear-gradient(-45deg, 
                #000000, #001326, #2b0047, #4a0018, 
                #ff0055, #9900ff, #00ffd5, #00ff66, #000000);
            background-size: 400% 400%;
            animation: gradientLoop 5s ease infinite;
            
            border-left: 4px solid #00ffd5;
            box-shadow: -10px 0px 30px rgba(0, 255, 213, 0.2), -20px 0px 50px rgba(0, 0, 0, 0.8);
        }

        .sidebar::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                        linear-gradient(90deg, rgba(0, 255, 213, 0.02), rgba(255, 0, 150, 0.01), rgba(0, 255, 102, 0.02));
            z-index: 3;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* FLOATING MULTI-COLOR PARTICLES SYSTEM (SIDEBAR SCALE) */
        .sidebar-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .sidebar-dot {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            animation: sidebarFloatUp linear infinite;
        }

        @keyframes sidebarFloatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-1150px) translateX(50px); opacity: 0; }
        }

        /* Staggered Sidebar Particles matching the new vibrant colors */
        .sd1 { left: 10%; width: 6px; height: 6px; animation-duration: 4s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .sd2 { left: 25%; width: 4px; height: 4px; animation-duration: 5.5s; animation-delay: 0.7s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .sd3 { left: 45%; width: 8px; height: 8px; animation-duration: 3.5s; animation-delay: 1.5s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .sd4 { left: 70%; width: 5px; height: 5px; animation-duration: 4.5s; animation-delay: 0.2s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .sd5 { left: 85%; width: 7px; height: 7px; animation-duration: 6s; animation-delay: 2s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .sd6 { left: 35%; width: 5px; height: 5px; animation-duration: 5s; animation-delay: 1s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .sd7 { left: 60%; width: 9px; height: 9px; animation-duration: 3s; animation-delay: 2.7s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .sd8 { left: 20%; width: 4px; height: 4px; animation-duration: 6.5s; animation-delay: 0.5s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .sd9 { left: 75%; width: 6px; height: 6px; animation-duration: 4.2s; animation-delay: 1.2s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .sd10 { left: 50%; width: 5px; height: 5px; animation-duration: 5.2s; animation-delay: 3s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .sd11 { left: 90%; width: 7px; height: 7px; animation-duration: 3.7s; animation-delay: 0.9s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .sd12 { left: 15%; width: 8px; height: 8px; animation-duration: 4.7s; animation-delay: 2.4s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }

        /* Left-Side Interface Panels */
        .panel {
            background: rgba(0, 5, 15, 0.75);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 213, 0.15);
            border-left: 4px solid #00ffd5;
            backdrop-filter: blur(12px);
            z-index: 5;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            animation: panelGlow 2s ease-in-out infinite alternate;
            max-width: 400px;
        }

        @keyframes panelGlow {
            0% { border-color: rgba(0, 255, 213, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); }
            100% { border-color: rgba(255, 0, 119, 0.4); box-shadow: 0 8px 32px 0 rgba(255, 0, 119, 0.1); }
        }

        .webcam-container {
            height: 220px;
            margin-top: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .info-container {
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-container h2 {
            font-size: 16px;
            color: #00ffd5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .info-container p {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="gameplay-container">
        <div class="ipad-screen-placeholder">
            <div class="live-indicator">Live</div>
        </div>

        <div class="panel webcam-container">
            <div class="placeholder-text">[ Webcam / Chat Overlay ]</div>
        </div>

        <div class="panel info-container">
            <h2>Welcome To The Stream</h2>
            <p>Drop a follow and share the live stream! Thank you for supporting the channel.</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-particles">
            <div class="sidebar-dot sd1"></div><div class="sidebar-dot sd2"></div><div class="sidebar-dot sd3"></div><div class="sidebar-dot sd4"></div>
            <div class="sidebar-dot sd5"></div><div class="sidebar-dot sd6"></div><div class="sidebar-dot sd7"></div><div class="sidebar-dot sd8"></div>
            <div class="sidebar-dot sd9"></div><div class="sidebar-dot sd10"></div><div class="sidebar-dot sd11"></div><div class="sidebar-dot sd12"></div>
        </div>
    </div>

</body>
</html>
