<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream Overlay - Slim Sidebar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* Left Side: Expanded iPad Gameplay Area */
        .gameplay-container {
            width: 1536px; /* Expanded from 1440px to fill the new space */
            height: 1080px;
            background: transparent;
            z-index: 1;
            position: relative;
        }

        /* Right Side: Slimmed Down Vertical Sidebar (384px Wide) */
        .sidebar {
            width: 384px; /* Reduced from 480px */
            height: 1080px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            z-index: 2;
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.7);
            background: linear-gradient(135px, #000000, #001122, #002244, #000000);
            background-size: 400% 400%;
            animation: fluidGradient 24s ease infinite;
        }

        /* 7-Color Ultra-Dynamic Fluid Background Loop */
        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            14% { background-color: #ff0055; } /* Red Node */
            28% { background-color: #00ff66; } /* Green Node */
            42% { background-color: #00ffff; } /* Aqua Anchor */
            57% { background-color: #ff00aa; } /* Pink Node */
            71% { background-color: #b300ff; } /* Purple Node */
            85% { background-color: #001133; } /* Deep Blue Anchor */
            100% { background-position: 100% 50%; }
        }

        /* Floating Ambient Particle Canvas */
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .dot {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 12s linear infinite;
            filter: blur(1px);
            box-shadow: 0 0 10px currentColor;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-1120px) translateX(var(--drift)) scale(1.2);
                opacity: 0;
            }
        }

        /* Sidebar Content Containers (Webcam & Info Boxes) */
        .sidebar-content {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .box {
            width: 100%;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: border-color 0.5s ease;
        }

        /* Top Box: Adjusted Aspect Ratio for Webcam / Chat */
        .webcam-box {
            height: 240px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Bottom Box: Stream Goals & Info */
        .info-box {
            height: 720px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="gameplay-container"></div>

    <div class="sidebar">
        <div class="particle-container" id="particleContainer"></div>

        <div class="sidebar-content">
            <div class="box webcam-box">
                <div class="placeholder-text">Webcam / Chat Layer</div>
            </div>

            <div class="box info-box">
                <div class="placeholder-text" style="text-align: left;">Stream Info</div>
                </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('particleContainer');
        const colors = [
            '#00ffff', // Aqua
            '#ff0055', // Red
            '#00ff66', // Green
            '#ff00aa', // Pink
            '#b300ff', // Purple
            '#3366ff'  // Blue
        ];

        for (let i = 0; i < 24; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            
            // Randomize size, positioning, and animations inside the 384px bounds
            const size = Math.floor(Math.random() * 6) + 4; // 4px to 10px
            const leftPos = Math.random() * 100;
            const delay = Math.random() * 12;
            const duration = Math.floor(Math.random() * 4) + 10; // 10s to 14s
            const drift = (Math.random() * 60 - 30) + 'px'; // Soft drift
            const color = colors[i % colors.length];

            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = leftPos + '%';
            dot.style.animationDelay = delay + 's';
            dot.style.animationDuration = duration + 's';
            dot.style.color = color;
            dot.style.setProperty('--drift', drift);

            container.appendChild(dot);
        }
    </script>
</body>
</html>
