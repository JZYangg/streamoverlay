<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay - Cyber Red Fluid Webcam Border</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Webcam Container Panel (16:9 Aspect Ratio) */
        .webcam-panel {
            width: 480px;
            height: 270px;
            position: relative;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            z-index: 1;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9);
            overflow: hidden;
        }

        /* Pure Black & Red Fluid Moving Gradient Border Base */
        .webcam-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* Exact color synchronization from your sidebar styling */
            background: linear-gradient(-45deg, #000000, #400000, #ff002b, #100000, #ff1a40, #000000);
            background-size: 200% 200%;
            animation: fluidBorderLoop 6s ease infinite;
            z-index: -2;
        }

        /* Inner Content Mask to isolate a sharp 4px border track thickness */
        .webcam-panel::after {
            content: '';
            position: absolute;
            top: 4px;      /* Border thickness adjustment */
            left: 4px;     
            right: 4px;    
            bottom: 4px;   
            background: transparent; 
            border-radius: 6px;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        /* Fluid Gradient Wave and Rotation Loop combo to maximize visibility */
        @keyframes fluidBorderLoop {
            0% {
                background-position: 0% 50%;
                transform: rotate(0deg);
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
                transform: rotate(360deg);
            }
        }

        /* Tech Cyber Scanlines matching the sidebar overlay alpha layer */
        .scanlines {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 6px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Outer Glow Pulsing Contour System matching the signature red theme color */
        .glow-contour {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 26, 64, 0.3);
            pointer-events: none;
            z-index: 3;
            animation: contourPulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes contourPulse {
            0% {
                box-shadow: 0 0 8px rgba(255, 26, 64, 0.2);
                border-color: rgba(255, 26, 64, 0.3);
            }
            100% {
                box-shadow: 0 0 22px rgba(255, 0, 43, 0.5);
                border-color: rgba(255, 0, 43, 0.6);
            }
        }

        /* Corner Hardware Brackets matching the hot crimson accent accents */
        .bracket {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid #ff1a40;
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(0 0 4px #ff002b);
        }
        .top-left { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .top-right { top: 12px; right: 12px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 12px; left: 12px; border-right: none; border-top: none; }
        .bottom-right { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        /* UI Text Center Indicator */
        .placeholder-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 26, 64, 0.35);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 0;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="webcam-panel">
        <div class="bracket top-left"></div>
        <div class="bracket top-right"></div>
        <div class="bracket bottom-left"></div>
        <div class="bracket bottom-right"></div>
        
        <div class="scanlines"></div>
        <div class="glow-contour"></div>

        <div class="placeholder-indicator">Webcam Source Container</div>
    </div>

</body>
</html>
