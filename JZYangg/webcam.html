<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay - Cyber Matrix Hollow Webcam Border</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

            /* TEMPORARY TESTING BACKGROUND: 
               This dark grey color allows you to see the transparent cutout and glowing colors in your browser.
               CHANGE THIS TO "transparent" WHEN PUTTING IT INTO OBS / TIKTOK LIVE STUDIO.
            */
            background-color: #1a1a1a; 
        }

        /* Webcam Container Panel (16:9 Aspect Ratio) */
        .webcam-panel {
            width: 480px;
            height: 270px;
            position: relative;
            background: transparent; 
            border-radius: 12px;
            z-index: 1;
        }

        /* TRUE HOLLOW CUTOUT BORDER FRAME */
        .border-animation-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
            
            /* Center Cutout Masking - Uses clean alpha blending to completely hide white borders */
            mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            
            /* Controls the thick colorful track frame width */
            padding: 10px; 
        }

        /* The spinning colors inside the cutout ring wrapper */
        .border-animation-wrapper::before {
            content: '';
            position: absolute;
            top: -150px;
            left: -150px;
            right: -150px;
            bottom: -150px;
            background: linear-gradient(270deg, 
                #ff0055 0%, 
                #9900ff 25%, 
                #00ffd5 50%, 
                #00ff66 75%, 
                #ff0055 100%
            );
            background-size: 300% 300%;
            animation: matrixFluidLoop 4s linear infinite;
        }

        /* Inner Shadow Ring - Clean layout blend with no rigid outlines */
        .inner-frame-shadow {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 2;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.7);
        }

        /* Unified Fluid-Rotation Multi-Color Translation Loop */
        @keyframes matrixFluidLoop {
            0% {
                background-position: 0% 50%;
                transform: rotate(0deg);
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 200% 50%;
                transform: rotate(360deg);
            }
        }

        /* Tech Scanlines Overlay - Fades directly over the camera viewport area */
        .scanlines {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 4px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 3;
            pointer-events: none;
            opacity: 0.35;
        }

        /* Dynamic Outer Glow Contour System matching your spinning themes */
        .glow-contour {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            pointer-events: none;
            z-index: 4;
            animation: contourPulse 2.5s ease-in-out infinite alternate;
        }

        @keyframes contourPulse {
            0% {
                box-shadow: 0 0 12px rgba(0, 255, 213, 0.25);
            }
            100% {
                box-shadow: 0 0 25px rgba(255, 0, 85, 0.45);
            }
        }

        /* Tech Corner Brackets - Sits precisely on the interior color borders */
        .bracket {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid #00ffd5;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 3px #00ffd5);
        }
        .top-left { top: 14px; left: 14px; border-right: none; border-bottom: none; }
        .top-right { top: 14px; right: 14px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 14px; left: 14px; border-right: none; border-top: none; }
        .bracket.bottom-right { bottom: 14px; right: 14px; border-left: none; border-top: none; }
    </style>
</head>
<body>

    <div class="webcam-panel">
        <div class="border-animation-wrapper"></div>
        
        <div class="inner-frame-shadow"></div>
        <div class="scanlines"></div>
        <div class="glow-contour"></div>

        <div class="bracket top-left"></div>
        <div class="bracket top-right"></div>
        <div class="bracket bottom-left"></div>
        <div class="bracket bottom-right"></div>
    </div>

</body>
</html>
