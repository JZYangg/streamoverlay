<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* This tells the browser how to smoothly animate the angle variable */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* In OBS, this background is ignored if you set 
               the source background to transparent */
            background-color: #121010;
        }

        .webcam-panel {
            position: relative;
            width: 480px;
            height: 270px;
            border-radius: 20px;
            padding: 8px; /* This is the border thickness */
            
            /* The Circular Gradient */
            background: conic-gradient(from var(--angle), 
                #000000, #001326, #2b0047, #4a0018, 
                #ff0055, #9900ff, #00ffd5, #00ff66, #000000
            );
            
            /* 'linear' keeps the spinning speed constant so it doesn't stutter */
            animation: spin 5s linear infinite;
            
            /* Clip the gradient to the border area */
            background-clip: padding-box;
            z-index: 1; 
        }

        /* --- THE DYNAMIC SHADOW GENERATOR --- */
        .webcam-panel::before {
            content: '';
            position: absolute;
            top: -20px; /* Expands the shadow size */
            left: -20px;
            right: -20px;
            bottom: -20px;
            
            /* Uses the exact same circular gradient */
            background: conic-gradient(from var(--angle), 
                #000000, #001326, #2b0047, #4a0018, 
                #ff0055, #9900ff, #00ffd5, #00ff66, #000000
            );
            
            /* Run the SAME animation in sync */
            animation: spin 5s linear infinite;
            
            border-radius: 30px; /* Slightly softer than the panel */
            filter: blur(25px); /* Creates the soft glow */
            opacity: 0.8; 
            z-index: -1; 
        }

        /* The actual "hole" for your camera */
        .webcam-inner {
            width: 100%;
            height: 100%;
            background-color: #121010; /* Match this to your stream background or make transparent */
            border-radius: 14px;
            position: relative;
            z-index: 2; /* Content must be in front */
        }

        /* The animation that spins the color wheel */
        @keyframes spin {
            from { --angle: 0deg; }
            to { --angle: 360deg; }
        }
    </style>
</head>
<body>

    <div class="webcam-panel">
        <div class="webcam-inner"></div>
    </div>

</body>
</html>
