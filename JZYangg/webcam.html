<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay - Cyber Matrix Premium Webcam Border</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Webcam Container Panel (Standard 16:9 Aspect Ratio)
           Can be positioned and resized directly in TikTok LIVE Studio or OBS
        */
        .webcam-panel {
            width: 480px;
            height: 270px;
            position: relative;
            background: rgba(0, 5, 15, 0.65);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            z-index: 1;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.85), 
                        inset 0 0 20px rgba(0, 255, 213, 0.05);
            overflow: hidden;
        }

        /* Animated High-Speed Cyber Matrix Border Ring */
        .webcam-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* Seamless matching gradient sequence tracked from your main layout */
            background: conic-gradient(
                from 0deg,
                #000000 0%,
                #001326 15%,
                #2b0047 30%,
                #4a0018 45%,
                #ff0055 60%,
                #9900ff 75%,
                #00ffd5 90%,
                #00ff66 95%,
                #000000 100
            );
            animation: borderRotate 6s linear infinite;
            z-index: -2;
        }

        /* Inner masking element to isolate a sharp, clean 4px border track */
        .webcam-panel::after {
            content: '';
            position: absolute;
            top: 4px;      /* Border thickness */
            left: 4px;     
            right: 4px;    
            bottom: 4px;   
            background: rgba(0, 5, 15, 0.9); /* Opaque dark background for behind your webcam feed layer */
            border-radius: 9px;
            z-index: -1;
            pointer-events: none;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.7);
        }

        /* Continuous High-Speed Conic Rotation */
        @keyframes borderRotate {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Tech Scanline Overlay Grid constrained inside the frame */
        .scanlines {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 9px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(0, 255, 213, 0.01), rgba(255, 0, 150, 0.005), rgba(0, 255, 102, 0.01));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Subtle Glow Animation pulsing on the outer contour boundaries */
        .glow-contour {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 213, 0.2);
            pointer-events: none;
            z-index: 3;
            animation: contourPulse 2s ease-in-out infinite alternate;
        }

        @keyframes contourPulse {
            0% {
                box-shadow: 0 0 10px rgba(0, 255, 213, 0.1);
                border-color: rgba(0, 255, 213, 0.2);
            }
            100% {
                box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
                border-color: rgba(255, 0, 85, 0.3);
            }
        }

        /* Corner Tech Hardware Bracket Accent Decals */
        .bracket {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #00ffd5;
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(0 0 3px #00ffd5);
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* UI Text Placeholder (Can be hidden once camera feed layers directly above it) */
        .placeholder-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 0;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="webcam-panel">
        <div class="bracket top-left"></div>
        <div class="bracket top-right"></div>
        <div class="bracket bottom-left"></div>
        <div class="bracket bottom-right"></div>
        
        <div class="scanlines"></div>
        <div class="glow-contour"></div>

        <div class="placeholder-indicator">Webcam Source Container</div>
    </div>

</body>
</html>
