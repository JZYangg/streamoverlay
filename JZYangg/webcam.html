<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay - Cyber Matrix Transparent Webcam Border</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Webcam Container Panel (16:9 Aspect Ratio) */
        .webcam-panel {
            width: 480px;
            height: 270px;
            position: relative;
            /* CHANGED: Base container background is now fully clear/transparent */
            background: transparent; 
            border-radius: 12px;
            z-index: 1;
            overflow: hidden;
        }

        /* Full Dynamic Color Matrix Border System */
        .webcam-panel::before {
            content: '';
            position: absolute;
            top: -150px;
            left: -150px;
            right: -150px;
            bottom: -150px;
            
            background: linear-gradient(270deg, 
                #ff0055 0%, 
                #9900ff 25%, 
                #00ffd5 50%, 
                #00ff66 75%, 
                #ff0055 100%
            );
            background-size: 300% 300%;
            animation: matrixFluidLoop 4s linear infinite;
            z-index: -2;
        }

        /* Inner Content Frame Mask forming a clean 4px border track width */
        .webcam-mask-inner {
            position: absolute;
            top: 4px;      /* Border line thickness */
            left: 4px;     
            right: 4px;    
            bottom: 4px;   
            /* CHANGED: Clear window allows underlying camera feed layer to pass through */
            background: transparent; 
            border-radius: 9px;
            z-index: -1;
            pointer-events: none;
            /* Keeps a nice inner shading trace on your camera edge for clean depth definition */
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.6); 
        }

        /* Unified Fluid-Rotation Multi-Color Translation Loop */
        @keyframes matrixFluidLoop {
            0% {
                background-position: 0% 50%;
                transform: rotate(0deg);
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 200% 50%;
                transform: rotate(360deg);
            }
        }

        /* Cyber Matrix Tech Scanlines Overlay */
        .scanlines {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 9px;
            /* Lightened up line filters so they don't block your face capture */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Outer Glow Contour System utilizing Cyber Cyan #00ffd5 styling */
        .glow-contour {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 213, 0.25);
            pointer-events: none;
            z-index: 3;
            animation: contourPulse 2s ease-in-out infinite alternate;
        }

        @keyframes contourPulse {
            0% {
                box-shadow: 0 0 10px rgba(0, 255, 213, 0.2);
                border-color: rgba(0, 255, 213, 0.25);
            }
            100% {
                box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
                border-color: rgba(255, 0, 85, 0.4);
            }
        }

        /* Corner Tech Brackets matching Sidebar Laser Cyan accent */
        .bracket {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid #00ffd5;
            z-index: 4;
            pointer-events: none;
            filter: drop-shadow(0 0 4px #00ffd5);
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }
    </style>
</head>
<body>

    <div class="webcam-panel">
        <div class="webcam-mask-inner"></div>

        <div class="bracket top-left"></div>
        <div class="bracket top-right"></div>
        <div class="bracket bottom-left"></div>
        <div class="bracket bottom-right"></div>
        
        <div class="scanlines"></div>
        <div class="glow-contour"></div>
    </div>

</body>
</html>
