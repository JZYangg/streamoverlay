<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Background - Ultimate Cyber Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background-color: #000000;
        }

        /* HIGH-VELOCITY MULTI-COLOR NEON GRADIENT CANVAS */
        .background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 1;
            
            /* Perfectly blended palette matrix: Black, Aqua, Dark Blue, Red, Pink, Purple, Green */
            background: linear-gradient(-45deg, 
                #000000, #001326, #2b0047, #4a0018, 
                #ff0055, #9900ff, #00ffd5, #00ff66, #000000);
            background-size: 500% 500%;
            /* Fast 5-second fluid rhythm loop */
            animation: gradientLoop 5s ease infinite;
        }

        /* Cyber Tech Scanline Filter Layer */
        .background-canvas::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(0, 255, 213, 0.01), rgba(255, 0, 150, 0.005), rgba(0, 255, 102, 0.01));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        @keyframes gradientLoop {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CYBER WAVE EXTENDED BOUNDS SYSTEM (CLEAN OUT-OF-BOUNDS EXIT) */
        .wave-container {
            position: absolute;
            /* Extended past layout edges (1920 + 100) to keep stops and loops completely off-screen */
            left: -50px;
            width: 2020px; 
            height: 90px;
            z-index: 4;
            pointer-events: none;
        }

        .wave-top { top: 0; }
        .wave-bottom { bottom: 0; transform: scaleY(-1); }

        .wave-svg {
            width: 100%;
            height: 100%;
        }

        /* Dim underlying circuit track */
        .base-track {
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 3px;
            fill: none;
        }

        /* Laser beam tracking path */
        .laser-beam {
            stroke-width: 4px;
            stroke-linecap: round;
            fill: none;
            /* Long tail laser calculation (400px beam + 3000px hidden trailing buffer) */
            stroke-dasharray: 400 3000; 
            animation: waveLaserLoop 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Top Line: Neon Aqua shifting into Matrix Green glow */
        .wave-top .laser-beam {
            stroke: #00ffd5;
            filter: drop-shadow(0px 0px 8px #00ffd5) drop-shadow(0px 0px 15px #00ff66);
        }

        /* Bottom Line: Electric Pink shifting into Cyber Purple glow */
        .wave-bottom .laser-beam {
            stroke: #ff0077;
            filter: drop-shadow(0px 0px 8px #ff0077) drop-shadow(0px 0px 15px #9900ff);
            animation-delay: 1.5s; /* Kept staggered for alternating loops */
        }

        /* Advanced keyframe math: forces laser to pass 100% out of view before stopping/resetting */
        @keyframes waveLaserLoop {
            0% {
                stroke-dashoffset: 3400; /* Spawns completely out of bounds on the left */
            }
            45% {
                stroke-dashoffset: 0; /* Zips beautifully across waves and exits off-screen right */
            }
            100% {
                stroke-dashoffset: 0; /* Holds completely off-screen for a clean resting interval pause */
            }
        }

        /* FLOATING MULTI-COLOR PARTICLES SYSTEM */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            z-index: 3;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-1150px) translateX(80px); opacity: 0; }
        }

        /* 24 Fast Particles randomized across Aqua, Pink, Purple, and Green */
        .d1 { left: 5%; width: 6px; height: 6px; animation-duration: 4s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d2 { left: 12%; width: 4px; height: 4px; animation-duration: 5.5s; animation-delay: 0.7s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d3 { left: 18%; width: 8px; height: 8px; animation-duration: 3.5s; animation-delay: 1.5s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .d4 { left: 24%; width: 5px; height: 5px; animation-duration: 4.5s; animation-delay: 0.2s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d5 { left: 30%; width: 7px; height: 7px; animation-duration: 6s; animation-delay: 2s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d6 { left: 35%; width: 4px; height: 4px; animation-duration: 5s; animation-delay: 1s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d7 { left: 42%; width: 9px; height: 9px; animation-duration: 3s; animation-delay: 2.7s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .d8 { left: 47%; width: 5px; height: 5px; animation-duration: 6.5s; animation-delay: 0.5s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d9 { left: 53%; width: 6px; height: 6px; animation-duration: 4.2s; animation-delay: 1.2s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d10 { left: 58%; width: 4px; height: 4px; animation-duration: 5.2s; animation-delay: 3s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d11 { left: 62%; width: 7px; height: 7px; animation-duration: 3.7s; animation-delay: 0.9s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d12 { left: 68%; width: 8px; height: 8px; animation-duration: 4.7s; animation-delay: 2.4s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .d13 { left: 72%; width: 5px; height: 5px; animation-duration: 5.7s; animation-delay: 1.6s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d14 { left: 77%; width: 6px; height: 6px; animation-duration: 4s; animation-delay: 3.5s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d15 { left: 81%; width: 4px; height: 4px; animation-duration: 5s; animation-delay: 0.1s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d16 { left: 85%; width: 7px; height: 7px; animation-duration: 6.2s; animation-delay: 2.5s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .d17 { left: 89%; width: 5px; height: 5px; animation-duration: 4.5s; animation-delay: 3.1s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d18 { left: 94%; width: 6px; height: 6px; animation-duration: 3.5s; animation-delay: 1.8s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d19 { left: 98%; width: 8px; height: 8px; animation-duration: 5.5s; animation-delay: 0.4s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d20 { left: 15%; width: 5px; height: 5px; animation-duration: 4.2s; animation-delay: 2.1s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
        .d21 { left: 28%; width: 6px; height: 6px; animation-duration: 5s; animation-delay: 0.5s; background: #ff0077; box-shadow: 0 0 10px #ff0077; }
        .d22 { left: 50%; width: 4px; height: 4px; animation-duration: 6.5s; animation-delay: 2.6s; background: #00ffd5; box-shadow: 0 0 10px #00ffd5; }
        .d23 { left: 75%; width: 7px; height: 7px; animation-duration: 3.2s; animation-delay: 1.3s; background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .d24 { left: 91%; width: 5px; height: 5px; animation-duration: 4.7s; animation-delay: 3.7s; background: #9900ff; box-shadow: 0 0 10px #9900ff; }
    </style>
</head>
<body>

    <div class="background-canvas"></div>

    <div class="wave-container wave-top">
        <svg class="wave-svg" viewBox="0 0 2020 90" preserveAspectRatio="none">
            <path class="base-track" d="M 0,45 Q 252.5,10 505,45 T 1010,45 T 1515,45 T 2020,45" />
            <path class="laser-beam" d="M 0,45 Q 252.5,10 505,45 T 1010,45 T 1515,45 T 2020,45" />
        </svg>
    </div>

    <div class="wave-container wave-bottom">
        <svg class="wave-svg" viewBox="0 0 2020 90" preserveAspectRatio="none">
            <path class="base-track" d="M 0,45 Q 252.5,10 505,45 T 1010,45 T 1515,45 T 2020,45" />
            <path class="laser-beam" d="M 0,45 Q 252.5,10 505,45 T 1010,45 T 1515,45 T 2020,45" />
        </svg>
    </div>

    <div class="particles-container">
        <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div>
        <div class="dot d5"></div><div class="dot d6"></div><div class="dot d7"></div><div class="dot d8"></div>
        <div class="dot d9"></div><div class="dot d10"></div><div class="dot d11"></div><div class="dot d12"></div>
        <div class="dot d13"></div><div class="dot d14"></div><div class="dot d15"></div><div class="dot d16"></div>
        <div class="dot d17"></div><div class="dot d18"></div><div class="dot d19"></div><div class="dot d20"></div>
        <div class="dot d21"></div><div class="dot d22"></div><div class="dot d23"></div><div class="dot d24"></div>
    </div>

</body>
</html>
